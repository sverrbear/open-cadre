# OpenCadre Configuration
#
# Run `cadre init` to create your .cadre/ config directory interactively.
# Run `cadre explore` to auto-configure agents for your codebase.
#
# Config layout:
#   .cadre/
#     config.yml          ← main config (this file's format)
#     context.yml         ← project context (auto-populated by `cadre explore`)
#     agents/
#       lead.yml          ← per-agent config (model, enabled, extra_context)
#       architect.yml
#       engineer.yml
#       qa.yml
#
# The .cadre/ directory is gitignored — it contains local settings and API keys.

# --- .cadre/config.yml ---

project:
  name: "My Analytics Project"
  type: dbt                          # dbt | generic
  warehouse: snowflake               # snowflake | bigquery | redshift | postgres
  ci_platform: github_actions        # github_actions | gitlab_ci | none

# API keys — set via environment variables (recommended) or inline
providers:
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  openai:
    api_key: ${OPENAI_API_KEY}
  # google:
  #   api_key: ${GOOGLE_API_KEY}
  # ollama:
  #   api_base: http://localhost:11434

# Team configuration
team:
  mode: full                         # full (4 agents) | solo (1 agent)

# Tool permissions
tools:
  shell:
    allow:
      - "git *"
      - "dbt compile*"
      - "dbt ls*"
      - "dbt test*"
      - "sqlfluff*"
      - "ruff*"
    deny:
      - "rm -rf*"
      - "dbt run --full-refresh*"
      - "DROP*"
      - "DELETE FROM*"
      - "TRUNCATE*"

# Workflows
workflows:
  default: design-implement-review   # design-implement-review | code-review | model-creation

# --- .cadre/agents/lead.yml (example) ---
